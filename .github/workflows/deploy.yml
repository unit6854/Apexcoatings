name: Deploy to Namecheap Staging 
 
on: 
  push: 
    branches: [ main ] 
 
jobs: 
  deploy: 
    runs-on: ubuntu-latest 
 
    steps: 
    - name: Checkout code 
      uses: actions/checkout@v3 
 
    - name: Deploy via SSH 
      uses: appleboy/ssh-action@master 
      with: 
        host: ${{ secrets.CPANEL_HOST }} 
        username: ${{ secrets.CPANEL_USER }} 
        password: ${{ secrets.CPANEL_PASS }} 
        script: | 
          cd ~/public_html/wpcomstaging/wp-content/themes/apex-theme 
          git pull origin main 
          echo "? Theme deployed successfully at $(date)"
